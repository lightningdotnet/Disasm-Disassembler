name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  windows:
    name: Windows / MSVC / x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Sanity-check
        shell: pwsh
        run: |
          $exe = "build/Release/disasm.exe"
          if (-not (Test-Path $exe)) { throw "exe not produced" }
          $size = (Get-Item $exe).Length
          Write-Host "disasm.exe size: $size bytes"
          if ($size -lt 200000) { throw "exe suspiciously small" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: disasm-windows-x64
          path: build/Release/disasm.exe
          if-no-files-found: error
          retention-days: 14
